<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 420px;
      width: 100%;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .score {
      font-size: 1.2rem;
      color: #00c7b1;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .snake-canvas {
      background: #0a1f33;
      border: 2px solid #62d84e;
      border-radius: 8px;
      margin-bottom: 18px;
      box-shadow: 0 0 8px #62d84e33;
    }
    .game-over {
      color: #e8f4f8;
      background: rgba(98,216,78,0.15);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 1.1rem;
      margin-bottom: 12px;
      font-weight: 500;
      display: none;
    }
    .restart-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px #62d84e;
    }
    @media (max-width: 600px) {
      .game-card {
        padding: 16px 6px;
        max-width: 98vw;
      }
      .game-title {
        font-size: 1.3rem;
      }
      .snake-canvas {
        width: 98vw !important;
        height: 98vw !important;
        max-width: 320px !important;
        max-height: 320px !important;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.png" class="header-img" alt="Header" style="min-height:200px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Snake Game 🐍</div>
      <div class="score" id="score">Score: 0</div>
      <canvas id="snake-canvas" class="snake-canvas" width="400" height="400"></canvas>
      <div class="game-over" id="game-over">Game Over! Press Restart to play again.</div>
      <button class="restart-btn" id="restart-btn">Restart</button>
      <div style="color:#7a9bb5; margin-top:16px; font-size:0.95rem;">Use arrow keys to control the snake. Eat the green food, avoid walls and yourself!</div>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.png" class="footer-img" alt="Footer" style="min-height:40px; background:#0a1f33;" />
  <script>
    // Snake Game Logic
    const canvas = document.getElementById('snake-canvas');
    const ctx = canvas.getContext('2d');
    const scoreElem = document.getElementById('score');
    const gameOverElem = document.getElementById('game-over');
    const restartBtn = document.getElementById('restart-btn');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    let snake = [{x: 10, y: 10}];
    let direction = {x: 0, y: 0};
    let food = {x: 5, y: 5};
    let score = 0;
    let gameInterval = null;
    let gameOver = false;

    function drawTile(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
      ctx.strokeStyle = '#0e2d47';
      ctx.strokeRect(x * gridSize, y * gridSize, gridSize, gridSize);
    }

    function drawSnake() {
      snake.forEach((segment, idx) => {
        drawTile(segment.x, segment.y, idx === 0 ? '#62d84e' : '#00c7b1');
      });
    }

    function drawFood() {
      drawTile(food.x, food.y, '#62d84e');
    }

    function clearCanvas() {
      ctx.fillStyle = '#0a1f33';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function randomFood() {
      let newFood;
      while (true) {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        if (!snake.some(seg => seg.x === newFood.x && seg.y === newFood.y)) {
          break;
        }
      }
      food = newFood;
    }

    function moveSnake() {
      if (gameOver) return;
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
      // Wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        endGame();
        return;
      }
      // Self collision
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        endGame();
        return;
      }
      snake.unshift(head);
      // Food collision
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreElem.textContent = 'Score: ' + score;
        randomFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      clearCanvas();
      drawSnake();
      drawFood();
    }

    function gameLoop() {
      moveSnake();
      draw();
    }

    function startGame() {
      snake = [{x: 10, y: 10}];
      direction = {x: 0, y: 0};
      score = 0;
      scoreElem.textContent = 'Score: 0';
      randomFood();
      gameOver = false;
      gameOverElem.style.display = 'none';
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, 120);
    }

    function endGame() {
      gameOver = true;
      gameOverElem.style.display = 'block';
      clearInterval(gameInterval);
    }

    document.addEventListener('keydown', function(e) {
      if (gameOver) return;
      switch(e.key) {
        case 'ArrowUp':
          if (direction.y === 1) break;
          direction = {x: 0, y: -1};
          break;
        case 'ArrowDown':
          if (direction.y === -1) break;
          direction = {x: 0, y: 1};
          break;
        case 'ArrowLeft':
          if (direction.x === 1) break;
          direction = {x: -1, y: 0};
          break;
        case 'ArrowRight':
          if (direction.x === -1) break;
          direction = {x: 1, y: 0};
          break;
      }
    });

    restartBtn.addEventListener('click', startGame);

    // Responsive canvas
    function resizeCanvas() {
      let size = Math.min(window.innerWidth * 0.9, 400);
      canvas.width = size;
      canvas.height = size;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    startGame();
  </script>
</body>
</html>
