<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 16px;
      text-align: center;
    }
    .game-canvas {
      background: #0a1f33;
      border: 2px solid #62d84e;
      border-radius: 8px;
      margin-bottom: 20px;
      display: block;
    }
    .game-status {
      color: #7a9bb5;
      font-size: 1.1rem;
      margin-bottom: 12px;
      min-height: 24px;
      text-align: center;
    }
    .game-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .game-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px #62d84e;
    }
    @media (max-width: 600px) {
      .game-card { padding: 16px 6px; }
      .game-title { font-size: 1.3rem; }
      .game-canvas { width: 100%; max-width: 320px; }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Jumping Dinosaur Game</div>
      <canvas id="dinoCanvas" width="400" height="120" class="game-canvas"></canvas>
      <div class="game-status" id="gameStatus">Press Space or Tap to Jump!</div>
      <button class="game-btn" id="restartBtn" style="display:none;">Restart</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    // Jumping Dinosaur Game Logic
    const canvas = document.getElementById('dinoCanvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('gameStatus');
    const restartBtn = document.getElementById('restartBtn');

    // Game state
    let dino = { x: 40, y: 80, w: 32, h: 32, vy: 0, jumping: false };
    let groundY = 80;
    let gravity = 0.7;
    let jumpPower = -11;
    let obstacles = [];
    let score = 0;
    let gameOver = false;
    let speed = 4;
    let frame = 0;
    let gameLoop;
    let taunts = [
      "Ouch! Try again, dino!",
      "Watch out for those cacti!",
      "Jump higher next time!",
      "Dino needs a running start!",
      "Keep going, you can do it!"
    ];

    function resetGame() {
      dino.y = groundY;
      dino.vy = 0;
      dino.jumping = false;
      obstacles = [];
      score = 0;
      gameOver = false;
      speed = 4;
      frame = 0;
      statusDiv.textContent = "Press Space or Tap to Jump!";
      restartBtn.style.display = 'none';
      startGame();
    }

    function startGame() {
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 1000/60);
    }

    function jump() {
      if (!gameOver && !dino.jumping) {
        dino.vy = jumpPower;
        dino.jumping = true;
      }
    }

    function update() {
      frame++;
      // Dino physics
      dino.y += dino.vy;
      dino.vy += gravity;
      if (dino.y >= groundY) {
        dino.y = groundY;
        dino.vy = 0;
        dino.jumping = false;
      }
      // Obstacles
      if (frame % Math.floor(80/speed) === 0) {
        obstacles.push({ x: 400, y: groundY, w: 18, h: 36 });
      }
      for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].x -= speed;
      }
      // Remove off-screen obstacles
      obstacles = obstacles.filter(ob => ob.x + ob.w > 0);
      // Collision
      for (let ob of obstacles) {
        if (
          dino.x < ob.x + ob.w &&
          dino.x + dino.w > ob.x &&
          dino.y < ob.y + ob.h &&
          dino.y + dino.h > ob.y
        ) {
          endGame();
          return;
        }
      }
      // Score
      for (let ob of obstacles) {
        if (!ob.passed && ob.x + ob.w < dino.x) {
          ob.passed = true;
          score++;
          speed = 4 + Math.floor(score/5);
        }
      }
      draw();
    }

    function endGame() {
      clearInterval(gameLoop);
      gameOver = true;
      statusDiv.textContent = taunts[Math.floor(Math.random()*taunts.length)] + ` Score: ${score}`;
      restartBtn.style.display = 'inline-block';
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // Draw ground
      ctx.fillStyle = '#0e2d47';
      ctx.fillRect(0, groundY + dino.h, canvas.width, 8);
      // Draw dino
      ctx.fillStyle = '#62d84e';
      ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
      // Draw eye
      ctx.fillStyle = '#061525';
      ctx.fillRect(dino.x + dino.w - 8, dino.y + 8, 6, 6);
      // Draw obstacles
      for (let ob of obstacles) {
        ctx.fillStyle = '#00c7b1';
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        // Cactus spikes
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w/2, ob.y);
        ctx.lineTo(ob.x + ob.w/2 - 4, ob.y - 8);
        ctx.lineTo(ob.x + ob.w/2 + 4, ob.y - 8);
        ctx.closePath();
        ctx.fillStyle = '#62d84e';
        ctx.fill();
      }
      // Draw score
      ctx.font = 'bold 18px Outfit';
      ctx.fillStyle = '#e8f4f8';
      ctx.fillText(`Score: ${score}`, 300, 24);
    }

    // Controls
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') jump();
      if (gameOver && e.code === 'Enter') resetGame();
    });
    canvas.addEventListener('touchstart', e => {
      jump();
      e.preventDefault();
    });
    canvas.addEventListener('mousedown', jump);
    restartBtn.addEventListener('click', resetGame);

    // Start game
    resetGame();
  </script>
</body>
</html>
