<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #62d84e;
    }
    .choice-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      margin: 12px 8px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px #00c7b1;
    }
    .choice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #62d84e;
    }
    .animation {
      margin-top: 24px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .aladdin-fly {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 40px 40px, #62d84e 60%, #00c7b1 100%);
      border-radius: 50%;
      position: relative;
      animation: fly 1.2s ease-in-out;
    }
    @keyframes fly {
      0% { transform: translateY(60px) scale(0.7); opacity: 0.5; }
      60% { transform: translateY(-20px) scale(1.1); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    .genie-pop {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00c7b1 60%, #62d84e 100%);
      border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      position: relative;
      animation: pop 1.2s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0.5; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .status {
      color: #7a9bb5;
      font-size: 1rem;
      margin-top: 12px;
      min-height: 24px;
    }
    @media (max-width: 600px) {
      .game-card { padding: 16px 8px; }
      .game-title { font-size: 1.3rem; }
      .animation { min-height: 80px; }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Aladdin & Genie Game</div>
      <div class="status" id="status">Choose your adventure!</div>
      <button class="choice-btn" id="aladdinBtn">Ride the Magic Carpet</button>
      <button class="choice-btn" id="genieBtn">Summon the Genie</button>
      <div class="animation" id="animationArea"></div>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    const aladdinBtn = document.getElementById('aladdinBtn');
    const genieBtn = document.getElementById('genieBtn');
    const animationArea = document.getElementById('animationArea');
    const status = document.getElementById('status');
    const aladdinTaunts = [
      "Aladdin soars above Agrabah! 🧞‍♂️✨",
      "The carpet whirls with magic!",
      "You feel the wind of adventure!"
    ];
    const genieTaunts = [
      "Genie bursts out in a swirl of teal!",
      "Your wish is granted! 🧞",
      "Genie sparkles with power!"
    ];
    function randomTaunt(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    aladdinBtn.addEventListener('click', () => {
      animationArea.innerHTML = '<div class="aladdin-fly"></div>';
      status.textContent = randomTaunt(aladdinTaunts);
    });
    genieBtn.addEventListener('click', () => {
      animationArea.innerHTML = '<div class="genie-pop"></div>';
      status.textContent = randomTaunt(genieTaunts);
    });
  </script>
</body>
</html>
