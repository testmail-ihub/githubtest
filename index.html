<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 16px;
      text-align: center;
    }
    .game-desc {
      color: #7a9bb5;
      font-size: 1rem;
      margin-bottom: 24px;
      text-align: center;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 20px;
    }
    .choice-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 2px 8px rgba(98,216,78,0.15);
    }
    .choice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #62d84e;
    }
    .result {
      font-size: 1.2rem;
      color: #e8f4f8;
      margin-top: 16px;
      min-height: 32px;
      text-align: center;
    }
    .restart-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #00c7b1, #62d84e);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 22px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 2px 8px rgba(98,216,78,0.15);
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #00c7b1;
    }
    @media (max-width: 600px) {
      .game-card {
        padding: 18px 8px;
        max-width: 98vw;
      }
      .game-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>

  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header"
       style="min-height:140px; background:#061525;" />

  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Aladdin & Genie: Wish Game</div>
      <div class="game-desc">Aladdin meets Genie! Choose a wish and see what Genie grants. Can you find the magic outcome?</div>
      <div class="choices" id="choices"></div>
      <div class="result" id="result"></div>
      <button class="restart-btn" id="restartBtn" style="display:none;">Restart</button>
    </div>
  </div>

  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer"
       style="min-height:28px; background:#0a1f33;" />

  <script>
    // Aladdin & Genie Wish Game Logic
    const wishes = [
      { wish: "A mountain of gold", outcome: "Genie: Gold is heavy! You get a tiny coin instead. 🪙" },
      { wish: "A magic carpet ride", outcome: "Genie: Hold tight! You soar above Agrabah. 🏜️" },
      { wish: "Endless falafel", outcome: "Genie: Delicious! But you get one falafel for now. 🧆" },
      { wish: "Become a prince", outcome: "Genie: You look royal! But only for a minute. 👑" },
      { wish: "Three more wishes", outcome: "Genie: Nice try! Only one wish per game. 😜" }
    ];
    const taunts = [
      "Genie: You never know what you'll get!",
      "Aladdin: I hope Genie is feeling generous...",
      "Genie: Choose wisely, Aladdin!",
      "Aladdin: Let's see some magic!",
      "Genie: Ready for your wish?"
    ];
    let gameActive = true;
    function showChoices() {
      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';
      wishes.forEach((w, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = w.wish;
        btn.onclick = () => handleWish(idx);
        choicesDiv.appendChild(btn);
      });
      document.getElementById('result').textContent = taunts[Math.floor(Math.random()*taunts.length)];
      document.getElementById('restartBtn').style.display = 'none';
      gameActive = true;
    }
    function handleWish(idx) {
      if (!gameActive) return;
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = wishes[idx].outcome;
      document.getElementById('choices').innerHTML = '';
      document.getElementById('restartBtn').style.display = 'inline-block';
      gameActive = false;
    }
    document.getElementById('restartBtn').onclick = showChoices;
    window.onload = showChoices;
  </script>

</body>
</html>
