<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .status {
      font-size: 1.2rem;
      color: #62d84e;
      margin-bottom: 18px;
      font-weight: 600;
      min-height: 28px;
      text-align: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 12px;
      margin-bottom: 24px;
    }
    .cell {
      background: rgba(6,21,37,0.8);
      border: 1px solid rgba(98,216,78,0.2);
      color: #e8f4f8;
      border-radius: 8px;
      font-size: 2.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      box-shadow: 0 0 8px rgba(98,216,78,0.08);
      user-select: none;
    }
    .cell:hover {
      border-color: #62d84e;
      box-shadow: 0 0 12px #62d84e33;
    }
    .restart-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      font-size: 1rem;
      margin-top: 12px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 8px #00c7b133;
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 16px #62d84e66;
    }
    @media (max-width: 600px) {
      .game-card {
        padding: 18px 6px;
        max-width: 98vw;
      }
      .board {
        grid-template-columns: repeat(3, 40px);
        grid-template-rows: repeat(3, 40px);
        gap: 8px;
      }
      .cell {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="status" id="status">Your turn! Click a cell.</div>
      <div class="board" id="board">
        <div class="cell" id="cell-0"></div>
        <div class="cell" id="cell-1"></div>
        <div class="cell" id="cell-2"></div>
        <div class="cell" id="cell-3"></div>
        <div class="cell" id="cell-4"></div>
        <div class="cell" id="cell-5"></div>
        <div class="cell" id="cell-6"></div>
        <div class="cell" id="cell-7"></div>
        <div class="cell" id="cell-8"></div>
      </div>
      <button class="restart-btn" id="restart">Restart Game</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    // Tic-Tac-Toe game logic
    const board = Array(9).fill(null);
    let userTurn = true;
    let gameOver = false;
    const statusEl = document.getElementById('status');
    const cells = Array.from({length:9}, (_,i) => document.getElementById('cell-'+i));
    const restartBtn = document.getElementById('restart');

    function renderBoard() {
      for(let i=0;i<9;i++) {
        cells[i].textContent = board[i] || '';
        cells[i].style.pointerEvents = gameOver || board[i] ? 'none' : 'auto';
      }
    }

    function checkWinner(b) {
      const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      for(const [a,b1,c] of lines) {
        if(b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
      }
      if(b.every(cell => cell)) return 'draw';
      return null;
    }

    function userMove(idx) {
      if(!userTurn || gameOver || board[idx]) return;
      board[idx] = 'X';
      userTurn = false;
      renderBoard();
      const winner = checkWinner(board);
      if(winner) return endGame(winner);
      statusEl.textContent = "System's turn...";
      setTimeout(systemMove, 600);
    }

    function systemMove() {
      if(gameOver) return;
      // Simple AI: win → block → center → corner → random
      let move = findBestMove();
      if(move === null) move = board.findIndex(cell => !cell);
      if(move !== null) {
        board[move] = 'O';
        renderBoard();
        const winner = checkWinner(board);
        if(winner) return endGame(winner);
        userTurn = true;
        statusEl.textContent = "Your turn! Click a cell.";
      }
    }

    function findBestMove() {
      // Try to win
      for(let i=0;i<9;i++) {
        if(!board[i]) {
          board[i] = 'O';
          if(checkWinner(board)==='O') { board[i]=null; return i; }
          board[i]=null;
        }
      }
      // Try to block
      for(let i=0;i<9;i++) {
        if(!board[i]) {
          board[i] = 'X';
          if(checkWinner(board)==='X') { board[i]=null; return i; }
          board[i]=null;
        }
      }
      // Center
      if(!board[4]) return 4;
      // Corners
      for(const i of [0,2,6,8]) if(!board[i]) return i;
      // Random
      return null;
    }

    function endGame(winner) {
      gameOver = true;
      if(winner==='draw') {
        statusEl.textContent = "It's a draw!";
      } else if(winner==='X') {
        statusEl.textContent = "You win! 🧞";
      } else {
        statusEl.textContent = "System wins!";
      }
      cells.forEach(cell => cell.style.pointerEvents = 'none');
    }

    function restartGame() {
      for(let i=0;i<9;i++) board[i]=null;
      userTurn = true;
      gameOver = false;
      statusEl.textContent = "Your turn! Click a cell.";
      renderBoard();
      cells.forEach(cell => cell.style.pointerEvents = 'auto');
    }

    cells.forEach((cell,i) => cell.addEventListener('click',()=>userMove(i)));
    restartBtn.addEventListener('click',restartGame);
    renderBoard();
  </script>
</body>
</html>
