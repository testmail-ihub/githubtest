<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aladdin's AI-mation Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',sans-serif;background:#061525;color:#e8f4f8;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.header-img,.footer-img{width:100%;display:block;flex-shrink:0;}
.wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.cards{display:flex;gap:32px;}
.card{background:rgba(10,31,51,0.85);border:1px solid rgba(98,216,78,0.15);border-radius:12px;padding:32px 24px;cursor:pointer;box-shadow:0 0 20px rgba(98,216,78,0.25);transition:transform .2s;}
.card:hover{transform:translateY(-2px);}
.btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border-radius:10px;padding:12px 24px;border:none;cursor:pointer;margin-top:24px;}
.anim{display:flex;flex-direction:column;align-items:center;}
@keyframes fly{0%{left:-120px;top:40px;}50%{top:10px;}100%{left:calc(100vw - 120px);top:40px;}}
@keyframes shake{0%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}100%{transform:translateX(0);}}
@keyframes genieRise{0%{transform:translateY(60px) scale(0);}100%{transform:translateY(0) scale(1);}}
</style>
</head>
<body>
<img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px;background:#061525;" />
<div class="wrapper">
<div id="cards" class="cards">
<div class="card" onclick="showCarpet()">Ride the Magic Carpet</div>
<div class="card" onclick="showGenie()">Summon the Genie</div>
</div>
<div id="carpet" style="display:none;" class="anim">
<img id="carpetImg" src="https://pngimg.com/d/aladdin_lamp/aladdin_lamp_PNG24.png" width="120" style="position:absolute;animation:fly 2s linear infinite;" onerror="this.style.display='none';document.getElementById('carpetEmoji').style.display='block';" />
<div id="carpetEmoji" style="display:none;position:absolute;font-size:80px;animation:fly 2s linear infinite;">🧞‍♂️</div>
<div style="margin-top:100px;">Off to Agrabah!</div>
<button class="btn" onclick="back()">Back</button>
</div>
<div id="genie" style="display:none;" class="anim">
<img id="lampImg" src="https://pngimg.com/d/aladdin_lamp/aladdin_lamp_PNG21.png" width="100" style="animation:shake 1s;" onerror="this.style.display='none';document.getElementById('lampEmoji').style.display='block';setTimeout(showGenieImg,1000);" />
<div id="lampEmoji" style="display:none;font-size:60px;animation:shake 1s;">🧞‍♂️</div>
<img id="genieImg" src="https://pngimg.com/d/aladdin_lamp/aladdin_lamp_PNG7.png" width="80" style="display:none;animation:genieRise 1s forwards;" onerror="this.style.display='none';document.getElementById('genieEmoji').style.display='block';" />
<div id="genieEmoji" style="display:none;font-size:60px;animation:genieRise 1s forwards;">🧞</div>
<div style="margin-top:80px;">Your wish is my command!</div>
<button class="btn" onclick="back()">Back</button>
</div>
</div>
<img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px;background:#0a1f33;" />
<script>
function showCarpet(){document.getElementById('cards').style.display='none';document.getElementById('carpet').style.display='flex';}
function showGenie(){document.getElementById('cards').style.display='none';document.getElementById('genie').style.display='flex';setTimeout(showGenieImg,1000);}
function showGenieImg(){var g=document.getElementById('genieImg');if(g){g.style.display='block';}}
function back(){document.getElementById('carpet').style.display='none';document.getElementById('genie').style.display='none';document.getElementById('cards').style.display='flex';}
</script>
</body>
</html>
