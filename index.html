<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #e8f4f8;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .status {
      font-size: 1.1rem;
      color: #7a9bb5;
      margin-bottom: 18px;
      min-height: 24px;
      text-align: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 8px;
      margin-bottom: 24px;
    }
    .cell {
      background: rgba(6,21,37,0.8);
      border: 1px solid rgba(98,216,78,0.2);
      color: #e8f4f8;
      border-radius: 8px;
      font-size: 2.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 8px rgba(98,216,78,0.08);
    }
    .cell:hover {
      background: #0e2d47;
      box-shadow: 0 0 12px #62d84e;
    }
    .restart-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      font-size: 1rem;
      margin-top: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 10px #62d84e;
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #00c7b1;
    }
    @media (max-width: 600px) {
      .game-card {
        padding: 16px 6px;
        max-width: 98vw;
      }
      .board {
        grid-template-columns: repeat(3, 40px);
        grid-template-rows: repeat(3, 40px);
        gap: 5px;
      }
      .cell {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Tic-Tac-Toe</div>
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" id="cell-0"></div>
        <div class="cell" id="cell-1"></div>
        <div class="cell" id="cell-2"></div>
        <div class="cell" id="cell-3"></div>
        <div class="cell" id="cell-4"></div>
        <div class="cell" id="cell-5"></div>
        <div class="cell" id="cell-6"></div>
        <div class="cell" id="cell-7"></div>
        <div class="cell" id="cell-8"></div>
      </div>
      <button class="restart-btn" id="restart">Restart Game</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    const board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameActive = true;
    const statusDiv = document.getElementById('status');
    const cells = Array.from({length:9}, (_,i) => document.getElementById('cell-'+i));
    const restartBtn = document.getElementById('restart');

    function checkWinner() {
      const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8], // rows
        [0,3,6],[1,4,7],[2,5,8], // cols
        [0,4,8],[2,4,6] // diags
      ];
      for (let pattern of winPatterns) {
        const [a,b,c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return null;
    }

    function isDraw() {
      return board.every(cell => cell) && !checkWinner();
    }

    function updateStatus() {
      const winner = checkWinner();
      if (winner) {
        statusDiv.textContent = `Player ${winner} wins! 🎉`;
        gameActive = false;
      } else if (isDraw()) {
        statusDiv.textContent = "It's a draw!";
        gameActive = false;
      } else {
        statusDiv.textContent = `Player ${currentPlayer}'s turn`;
      }
    }

    function handleCellClick(idx) {
      if (!gameActive || board[idx]) return;
      board[idx] = currentPlayer;
      cells[idx].textContent = currentPlayer;
      cells[idx].style.color = currentPlayer === 'X' ? '#62d84e' : '#00c7b1';
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus();
    }

    cells.forEach((cell, idx) => {
      cell.addEventListener('click', () => handleCellClick(idx));
    });

    restartBtn.addEventListener('click', () => {
      for (let i=0; i<9; i++) {
        board[i] = null;
        cells[i].textContent = '';
        cells[i].style.color = '#e8f4f8';
      }
      currentPlayer = 'X';
      gameActive = true;
      updateStatus();
    });

    updateStatus();
  </script>
</body>
</html>
