<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 12px;
      margin-bottom: 24px;
    }
    .cell {
      background: rgba(6,21,37,0.8);
      border: 1px solid rgba(98,216,78,0.2);
      color: #e8f4f8;
      border-radius: 8px;
      font-size: 2.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(98,216,78,0.08);
    }
    .cell:hover {
      border-color: #62d84e;
      background: rgba(98,216,78,0.08);
    }
    .status {
      font-size: 1.1rem;
      color: #7a9bb5;
      margin-bottom: 12px;
      min-height: 24px;
      text-align: center;
    }
    .taunt {
      font-size: 1rem;
      color: #00c7b1;
      margin-bottom: 18px;
      min-height: 24px;
      text-align: center;
      font-style: italic;
      transition: opacity 0.3s;
    }
    .restart-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      margin-top: 12px;
      box-shadow: 0 0 12px rgba(98,216,78,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px #62d84e;
    }
    @media (max-width: 600px) {
      .game-card {
        padding: 16px 6px;
        max-width: 98vw;
      }
      .board {
        grid-template-columns: repeat(3, 60px);
        grid-template-rows: repeat(3, 60px);
        gap: 8px;
      }
      .cell {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <img src="header-banner.png" class="header-img" alt="Header" style="min-height:200px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Tic-Tac-Toe: X vs O</div>
      <div class="status" id="status">Your turn! Click a cell to play as X.</div>
      <div class="taunt" id="taunt"></div>
      <div class="board" id="board">
        <div class="cell" id="cell-0"></div>
        <div class="cell" id="cell-1"></div>
        <div class="cell" id="cell-2"></div>
        <div class="cell" id="cell-3"></div>
        <div class="cell" id="cell-4"></div>
        <div class="cell" id="cell-5"></div>
        <div class="cell" id="cell-6"></div>
        <div class="cell" id="cell-7"></div>
        <div class="cell" id="cell-8"></div>
      </div>
      <button class="restart-btn" id="restart">Restart Game</button>
    </div>
  </div>
  <img src="footer-banner.png" class="footer-img" alt="Footer" style="min-height:40px; background:#0a1f33;" />
  <script>
    const board = Array(9).fill(null);
    let userTurn = true;
    let gameOver = false;
    const taunts = [
      "Is that all you've got?",
      "Ouch, that move hurt!",
      "You call that a strategy?",
      "I'm just warming up!",
      "Better luck next time!",
      "You can't outsmart me!",
      "Did you really think that would work?",
      "I'm the O-mighty AI!",
      "X marks the spot, but O rules the board!",
      "Nice try, human!"
    ];
    function renderBoard() {
      for (let i = 0; i < 9; i++) {
        const cell = document.getElementById(`cell-${i}`);
        cell.textContent = board[i] || '';
        cell.style.pointerEvents = gameOver || board[i] ? 'none' : userTurn ? 'auto' : 'none';
      }
    }
    function checkWinner(b) {
      const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      for (const [a,b1,c] of lines) {
        if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
      }
      if (b.every(cell => cell)) return 'draw';
      return null;
    }
    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    function showTaunt(msg) {
      const tauntDiv = document.getElementById('taunt');
      tauntDiv.textContent = msg;
      tauntDiv.style.opacity = 1;
      setTimeout(() => { tauntDiv.style.opacity = 0.5; }, 1800);
    }
    function aiMove() {
      // AI strategy: win → block → center → corner → random
      const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
      // Try to win
      for (const i of empty) {
        const copy = board.slice();
        copy[i] = 'O';
        if (checkWinner(copy) === 'O') return i;
      }
      // Try to block
      for (const i of empty) {
        const copy = board.slice();
        copy[i] = 'X';
        if (checkWinner(copy) === 'X') return i;
      }
      // Take center
      if (empty.includes(4)) return 4;
      // Take corner
      const corners = [0,2,6,8].filter(c => empty.includes(c));
      if (corners.length) return corners[Math.floor(Math.random()*corners.length)];
      // Random
      return empty[Math.floor(Math.random()*empty.length)];
    }
    function handleCellClick(i) {
      if (!userTurn || gameOver || board[i]) return;
      board[i] = 'X';
      renderBoard();
      const winner = checkWinner(board);
      if (winner) {
        endGame(winner);
        return;
      }
      userTurn = false;
      showStatus("AI's turn...");
      setTimeout(() => {
        const move = aiMove();
        board[move] = 'O';
        renderBoard();
        const winner2 = checkWinner(board);
        showTaunt(taunts[Math.floor(Math.random()*taunts.length)]);
        if (winner2) {
          endGame(winner2);
        } else {
          userTurn = true;
          showStatus("Your turn! Click a cell to play as X.");
        }
      }, 700);
    }
    function endGame(winner) {
      gameOver = true;
      if (winner === 'draw') {
        showStatus("It's a draw! 🧞");
      } else if (winner === 'X') {
        showStatus("You win! 🧞");
      } else {
        showStatus("AI wins! 🧞");
      }
      for (let i = 0; i < 9; i++) {
        document.getElementById(`cell-${i}`).style.pointerEvents = 'none';
      }
    }
    function restartGame() {
      for (let i = 0; i < 9; i++) board[i] = null;
      userTurn = true;
      gameOver = false;
      renderBoard();
      showStatus("Your turn! Click a cell to play as X.");
      showTaunt("");
    }
    for (let i = 0; i < 9; i++) {
      document.getElementById(`cell-${i}`).addEventListener('click', () => handleCellClick(i));
    }
    document.getElementById('restart').addEventListener('click', restartGame);
    renderBoard();
    showStatus("Your turn! Click a cell to play as X.");
  </script>
</body>
</html>
