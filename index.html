<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .game-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 16px;
      text-align: center;
    }
    .score {
      font-size: 1.2rem;
      color: #00c7b1;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .game-area {
      position: relative;
      width: 320px;
      height: 420px;
      background: #0a1f33;
      border-radius: 10px;
      border: 1px solid #0e2d47;
      margin-bottom: 18px;
      overflow: hidden;
      box-shadow: 0 0 12px #00c7b1;
    }
    .balloon {
      position: absolute;
      width: 40px;
      height: 60px;
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 2px 8px #7a9bb5;
      cursor: pointer;
      transition: transform 0.1s;
      border: 2px solid #e8f4f8;
    }
    .balloon:active {
      transform: scale(0.95);
    }
    .shoot-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      font-size: 1rem;
      margin-top: 8px;
      cursor: pointer;
      box-shadow: 0 0 12px #62d84e;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .shoot-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px #00c7b1;
    }
    .restart-btn {
      background: #0e2d47;
      color: #62d84e;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 20px;
      border: 1px solid #62d84e;
      font-size: 1rem;
      margin-top: 12px;
      cursor: pointer;
      box-shadow: 0 0 8px #62d84e;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 16px #00c7b1;
    }
    .game-over {
      font-size: 1.1rem;
      color: #7a9bb5;
      margin-top: 10px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .game-card {
        max-width: 98vw;
        padding: 16px 4px;
      }
      .game-area {
        width: 98vw;
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="game-card">
      <div class="game-title">Balloon Shooting Game 🧞</div>
      <div class="score" id="score">Score: 0</div>
      <div class="game-area" id="gameArea"></div>
      <button class="shoot-btn" id="shootBtn">Shoot!</button>
      <button class="restart-btn" id="restartBtn" style="display:none;">Restart</button>
      <div class="game-over" id="gameOverMsg" style="display:none;"></div>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    // Balloon Shooting Game Logic
    const gameArea = document.getElementById('gameArea');
    const scoreDisplay = document.getElementById('score');
    const shootBtn = document.getElementById('shootBtn');
    const restartBtn = document.getElementById('restartBtn');
    const gameOverMsg = document.getElementById('gameOverMsg');

    let balloons = [];
    let score = 0;
    let gameActive = true;
    let balloonInterval;
    let maxBalloons = 10;
    let balloonsShot = 0;

    function randomPosition() {
      const x = Math.floor(Math.random() * (gameArea.offsetWidth - 40));
      const y = Math.floor(Math.random() * (gameArea.offsetHeight - 60));
      return { x, y };
    }

    function createBalloon() {
      if (!gameActive || balloons.length >= maxBalloons) return;
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      const pos = randomPosition();
      balloon.style.left = pos.x + 'px';
      balloon.style.top = pos.y + 'px';
      balloon.addEventListener('click', () => shootBalloon(balloon));
      gameArea.appendChild(balloon);
      balloons.push(balloon);
    }

    function shootBalloon(balloon) {
      if (!gameActive) return;
      balloon.remove();
      balloons = balloons.filter(b => b !== balloon);
      score += 1;
      balloonsShot += 1;
      scoreDisplay.textContent = 'Score: ' + score;
      if (balloonsShot >= maxBalloons) {
        endGame();
      }
    }

    function shootRandomBalloon() {
      if (!gameActive || balloons.length === 0) return;
      // Shoot the first balloon
      shootBalloon(balloons[0]);
    }

    function startGame() {
      score = 0;
      balloonsShot = 0;
      scoreDisplay.textContent = 'Score: 0';
      gameActive = true;
      gameOverMsg.style.display = 'none';
      restartBtn.style.display = 'none';
      // Remove all balloons
      balloons.forEach(b => b.remove());
      balloons = [];
      // Start balloon creation
      balloonInterval = setInterval(() => {
        createBalloon();
        if (balloons.length >= maxBalloons) {
          clearInterval(balloonInterval);
        }
      }, 900);
    }

    function endGame() {
      gameActive = false;
      clearInterval(balloonInterval);
      gameOverMsg.textContent = 'Game Over! Your score: ' + score + '. Click Restart to play again.';
      gameOverMsg.style.display = 'block';
      restartBtn.style.display = 'inline-block';
    }

    shootBtn.addEventListener('click', shootRandomBalloon);
    restartBtn.addEventListener('click', startGame);

    // Start the game on load
    window.onload = startGame;
  </script>
</body>
</html>
