<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spokes AI Agents | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #061525;
      color: #e8f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .header-img, .footer-img {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }
    .excuse-card {
      background: rgba(10,31,51,0.85);
      border: 1px solid rgba(98,216,78,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 20px rgba(98,216,78,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .excuse-title {
      font-size: 2rem;
      font-weight: 700;
      color: #62d84e;
      margin-bottom: 18px;
      text-align: center;
    }
    .excuse-output {
      font-size: 1.2rem;
      color: #e8f4f8;
      margin: 18px 0;
      min-height: 48px;
      text-align: center;
    }
    .excuse-btn {
      background: linear-gradient(135deg, #62d84e, #00c7b1);
      color: #061525;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      margin-top: 12px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 8px #62d84e33;
    }
    .excuse-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 16px #00c7b1aa;
    }
    .excuse-desc {
      color: #7a9bb5;
      font-size: 1rem;
      margin-bottom: 12px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .excuse-card {
        padding: 18px 8px;
        max-width: 98vw;
      }
      .excuse-title {
        font-size: 1.3rem;
      }
      .excuse-output {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/header-banner.jpg" class="header-img" alt="Header" style="min-height:140px; background:#061525;" />
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
    <div class="excuse-card">
      <div class="excuse-title">Corporate Excuse Generator</div>
      <div class="excuse-desc">Generate a professional, plausible excuse for any corporate scenario. Click below for instant inspiration!</div>
      <div class="excuse-output" id="excuseOutput">Ready to impress? 🧞</div>
      <button class="excuse-btn" id="generateBtn">Generate Excuse</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/testmail-ihub/spokes-ai-assets/main/footer-banner.jpg" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    const excuses = [
      "Due to unforeseen client requirements, I need to reschedule our meeting.",
      "I'm currently awaiting critical feedback from another department before proceeding.",
      "A last-minute compliance review has temporarily shifted my priorities.",
      "There was an unexpected system outage impacting deliverables.",
      "I'm addressing urgent escalations from leadership and will circle back soon.",
      "Our team is aligning on new strategic objectives, which may affect timelines.",
      "I'm coordinating with external stakeholders for additional approvals.",
      "Due to bandwidth constraints, I need to defer this task until next week.",
      "I'm awaiting clarification on project scope from management.",
      "A key resource is currently unavailable, impacting progress.",
      "I need to review updated documentation before taking action.",
      "There are ongoing negotiations that require my immediate attention.",
      "I'm prioritizing compliance and risk mitigation activities today.",
      "A cross-functional dependency is causing a temporary delay.",
      "I'm preparing for an upcoming audit, which is consuming my bandwidth."
    ];
    function getRandomExcuse() {
      const idx = Math.floor(Math.random() * excuses.length);
      return excuses[idx];
    }
    document.getElementById('generateBtn').addEventListener('click', function() {
      const excuse = getRandomExcuse();
      document.getElementById('excuseOutput').textContent = excuse;
    });
  </script>
</body>
</html>
